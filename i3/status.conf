general {
	colors = true
	interval = 2
} 

order += "wireless wlp4s0"
order += "ethernet enp0s25"
order += "run_watch DHCP"
order += "volume master"
order += "cpu_usage"
order += "load"
order += "disk /"
order += "disk /home"
order += "battery 0"
order += "tztime date"

volume master {
	format = "♪: %volume"
	device = "default"
	mixer = "Master"
	mixer_idx = 0
}
 
load {
	format = "Δ: %1min"
}
 
cpu_usage {
	format = "C: %usage"
} 

wireless wlp4s0 {
        format_up = "W: (%quality at %essid, %bitrate) %ip"
        format_down = "W: down"
}

ethernet enp0s25 {
        # if you use %speed, i3status requires the cap_net_admin capability
        format_up = "E: %ip"
        format_down = "E: down"
}

battery 0 {
        format = "%status %percentage %remaining"
        path = "/sys/class/power_supply/BAT%d/uevent"
        low_threshold = 10
}

run_watch DHCP {
        pidfile = "/var/run/dhclient*.pid"
}

tztime date {
        format = "%H:%M %p, %A, %d.%m.%Y"
}

disk "/" {
        format = "/: %free"
}

disk "/home" {
	format = "/home: %free"
}
